<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>A-Frame: shuffle</title>
  <meta itemprop="name" content="A-Frame: shuffle">
  <meta name="twitter:title" content="A-Frame: shuffle">
  <meta property="og:title" content="A-Frame: shuffle">
  <meta property="og:site_name" content="A-Frame: shuffle">
  <meta name="description" content="">
  <meta itemprop="description" content="">
  <meta property="og:description" content="">
  <meta name="twitter:description" content="">
  <script crossorigin="anonymous" src="./external/scripts/8frame-1.4.1.min.js"></script>
  <script crossorigin="anonymous" src="./external/xrextras/xrextras.js"></script>
  <script crossorigin="anonymous" src="./external/landing-page/landing-page.js"></script>
  <script crossorigin="anonymous" src="./external/xr/xr.js" async="true" data-preload-chunks="face, slam">
  </script>

<!-- Copyright (c) 2022 8th Wall, Inc. -->
<!-- head.html is optional; elements will be added to your html head before app.js is loaded. -->

<!-- Use "8thwall:" meta tags to hook into 8th Wall's build process and developer tools. -->
<meta name="8thwall:renderer" content="aframe:1.4.1"/>
<meta name="8thwall:package" content="@8thwall.xrextras"/>
<meta name="8thwall:package" content="@8thwall.landing-page"/>

<!-- Other external scripts and meta tags can also be added. -->
<script src="./external/scripts/aframe-extras-6.1.1.min.js" crossorigin="anonymous"></script>

<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=0"/>

</head>

<body>
<script src="bundle.js"></script>
<!-- Copyright (c) 2021 8th Wall, Inc. -->
<!-- body.html is optional; elements will be added to your html body after app.js is loaded. -->

<!-- recenter button -->
<img id="recenterBtn" class="topBar" src="assets/icons/recenter.svg" />

<!-- intro card -->
<div id="introCard">
  <div id="cardContainer">
    <h1>Shuffle</h1>
    <p>Watch the box containing the blue ball while the boxes shuffle. Tap to reveal.</p>
    <button id="begin">Start</button>
  </div>
</div>

<!-- instructions -->
<div id="instructions" class="bottomBar">
  <p>Tap to Place</p>
</div>

<!-- scene -->
<a-scene
  landing-page
  xrextras-loading
  xrextras-runtime-error
  renderer="colorManagement: true"
  xrweb="allowedDevices: any"
  sequence
  overlay>
  <a-assets>
    <img id="grid" src="./assets/textures/grid.png" />
    <img id="glow" src="./assets/textures/glow.png" />
  </a-assets>

  <a-camera
    id="camera"
    position="0 6 6"
    raycaster="objects: .cantap"
    cursor="fuse: false; rayOrigin: mouse;">
  </a-camera>

  <!-- lights -->
  <a-entity
    light="
      type: directional;
      intensity: 0.8;
      castShadow: true;
      shadowMapHeight:2048;
      shadowMapWidth:2048;
      shadowCameraTop: 10;
      target: #model;
      shadowRadius: 4"
    xrextras-attach="target: model; offset: 1 15 3;"
    shadow>
  </a-entity>

  <a-light type="ambient" intensity="0.8"></a-light>

  <a-plane
    id="ground"
    rotation="-90 0 0"
    position="0 -.05 0"
    width="1000"
    height="1000"
    material="shader: shadow; opacity: 0.3"
    shadow>
  </a-plane>

  <!-- models -->
  <a-entity id="models" visible="false" xrextras-pinch-scale>
    <a-entity id="pivot"></a-entity>
    <a-entity id="model"></a-entity>
    <a-entity id="model1" position="-2 0 0" shadow="receive: true">
      <a-box id="box1" class="cantap" position="0 0.5 0"></a-box>
      <a-circle
        radius="3"
        position="0 -0.01 0"
        rotation="-90 0 0"
        src="#glow"
        transparent="true"
        opacity="0"></a-circle>
    </a-entity>
    <a-entity id="model2" position="0 0 0" shadow="receive: true">
      <a-box id="box2" class="cantap" position="0 0.5 0"></a-box>
      <a-circle
        radius="3"
        position="0 -0.02 0"
        rotation="-90 0 0"
        src="#glow"
        transparent="true"
        opacity="0"></a-circle>
    </a-entity>
    <a-entity id="model3" position="2 0 0" shadow="receive: true">
      <a-box id="box3" class="cantap" position="0 0.5 0"></a-box>
      <a-circle radius="3" rotation="-90 0 0" src="#glow" transparent="true" opacity="0"></a-circle>
    </a-entity>
  </a-entity>

  <a-plane width="500" height="500" rotation="-90 0 0" position="0 -0.1 0" xrextras-hider-material>
  </a-plane>
</a-scene>

</body>

</html>
